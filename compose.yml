services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes

  bot:
    build: ./bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      PG_HOST: db
      BOT_API_PORT: "8001"
    volumes:
      - media_data:/app/media
    ports:
      - "8001:8001"
    networks:
      - hermes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web-api:
    build: ./web-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started
    env_file: .env
    environment:
      PG_HOST: db
      BOT_API_URL: "http://bot:8001"
      MEDIA_DIR: /app/media
    # Port 8000 non exposé — uniquement accessible depuis le réseau Docker interne
    volumes:
      - media_data:/app/media
    networks:
      - hermes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      web-api:
        condition: service_healthy
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/proxy}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      WEB_API_INTERNAL_URL: http://web-api:8000
      PG_HOST: db
    ports:
      - "3000:3000"
    networks:
      - hermes
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  media_data:

networks:
  hermes:
    driver: bridge
