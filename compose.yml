services:

  # ─── Base de données ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes

  # ─── Bot Discord ──────────────────────────────────────────────────────────────
  bot:
    build: ./bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      PG_HOST: db
      API_PORT: "8001"
    volumes:
      - media_data:/app/media
    networks:
      - hermes

  # ─── Backend (FastAPI) ────────────────────────────────────────────────────────
  web-api:
    build: ./web-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started
    env_file: .env
    environment:
      PG_HOST: db
      BOT_API_URL: "http://bot:8001"
      BOT_API_TOKEN: ${API_TOKEN}
      MEDIA_DIR: /app/media
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    networks:
      - hermes

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────────
  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - web-api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    networks:
      - hermes

volumes:
  postgres_data:
  media_data:

networks:
  hermes:
    driver: bridge
